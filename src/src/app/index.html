<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>VueTube</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="jquery/jquery-ui.css">
    <link href="bootstrap/bootstrap-5.3.0.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="jquery/jquery.js" defer></script>
    <script src="jquery/jquery-ui.js" defer></script>
    <script src="bootstrap/bootstrap-5.3.0.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
            crossorigin="anonymous" defer></script>
    <script src="database/pouchdb-8.0.1.min.js" defer></script>
    <script src="shared.js" defer></script>
    <script src="index.js" defer></script>
</head>
<body>
<div class="page-wrap">
    <div id="header"></div>

    <main class="hero">
        <div class="hero-inner">
            <h1 class="hero-title">
                <img class="hero-logo" src="static/logo.png" alt="VueTube logo">
                VueTube
            </h1>
            <div class="hero-search">
                <input id="searchInput2" type="search" class="search-input" placeholder="Search YouTube…" aria-label="Search">
                <button id="bt2" class="btn-search" type="button">Search</button>
            </div>
        </div>
    </main>

    <div id="footer"></div>
</div>
</body>
</html>
