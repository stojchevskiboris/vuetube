<header class="site-header">
    <button class="header-logo" id="homeBtn" aria-label="Go to home">
        <img src="static/logo.png" width="36" height="36" alt="VueTube logo">
        <span>VueTube</span>
    </button>

    <div class="header-search">
        <input id="searchInput" type="search" class="search-input" placeholder="Search…" aria-label="Search">
        <button id="bt1" class="btn-search" type="button">Search</button>
    </div>

    <nav class="header-nav">
        <button class="nav-btn" id="likedVids" aria-label="Liked Videos">&#9829; Liked</button>
        <a href="https://github.com/stojchevskiboris/vuetube" target="_blank" rel="noopener" class="nav-icon-link" aria-label="GitHub">
            <img id="githubLink" src="static/githubDark.png" width="28" height="28" alt="GitHub">
        </a>
        <button class="nav-icon-btn" id="contrastLink" aria-label="Toggle theme">
            <img src="static/darklight.png" width="28" height="28" alt="Toggle theme">
        </button>
    </nav>
</header>
