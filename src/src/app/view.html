<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>VueTube – Watch</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="jquery/jquery-ui.css">
    <link href="bootstrap/bootstrap-5.3.0.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="jquery/jquery.js" defer></script>
    <script src="jquery/jquery-ui.js" defer></script>
    <script src="bootstrap/bootstrap-5.3.0.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
            crossorigin="anonymous" defer></script>
    <script src="database/pouchdb-8.0.1.min.js" defer></script>
    <script src="shared.js" defer></script>
    <script src="view.js" defer></script>
</head>
<body>
<div class="page-wrap">
    <div id="header"></div>

    <main class="view-page">
        <div class="player-wrap">
            <div class="player-container">
                <iframe id="player" title="YouTube video player"
                        src="https://www.youtube.com/embed/"
                        frameborder="0" allowfullscreen
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
            <div class="video-meta">
                <h2 class="video-title" id="watchTitle"></h2>
                <p class="video-channel" id="channelName"></p>
                <p class="video-date" id="publishedAt"></p>
                <div class="like-actions">
                    <button class="btn-like" id="like">&#9829; Like</button>
                    <button class="btn-unlike" id="unlike">&#10006; Unlike</button>
                </div>
            </div>
        </div>

        <section class="suggestions">
            <h3 class="suggestions-title">Suggested Videos</h3>
            <div id="results" class="cards-grid"></div>
        </section>
    </main>

    <div id="footer"></div>
</div>
</body>
</html>
